repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8    
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --manifest-path rust/Cargo.toml
        language: system
        types: [rust]
        pass_filenames: false